<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    <title>Projects</title>

<style>
body {
    background-image: url("BlueBackground.png");
    background-color: black; /* Fallback if the background image doesn't load */
    background-size: cover;
    color: white;
    font-family: Arial;
    margin: 0;
}

/* Navigation Bar Styles */
.nav {
    background: #5fe3ec;
    width: 900px;
    margin: auto;
    margin-top: 30px;
    margin-bottom: 50px;
    padding: 15px;
    border-radius: 30px;
    text-align: center;
}

/* Navigation links styled as pills */
.nav a {
    display: inline-block;
    text-decoration: none;
    color: black;
    background: #7beaf2;
    width: 140px;
    padding: 10px 0;
    margin: 5px;
    border-radius: 20px;
    font-weight: bold;
    text-align: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.9rem;
}


/* Three-column layout table stretching across the page */
.projects-table {
    width: 95%;
    margin: auto;
    /* This distributes the columns evenly with spacing between them */
    border-collapse: separate;
    border-spacing: 30px 0px; 
}

/* Style for each project block column */
.project-column {
    width: 33.33%;
    vertical-align: top;
    text-align: center;
}

/* Project headers styling */
.project-column h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.1rem;
    margin-bottom: 15px;
    letter-spacing: 1px;
}

/* The horizontal cyan lines under the project names */
.cyan-line {
    border: none;
    height: 1px;
    background-color: #5fe3ec;
    margin-top: 8px;
    margin-bottom: 8px;
    width: 100%;
}

/* Resizing and outlining the project preview screenshots */
.project-image {
    width: 100%; /* Spans across its third of the screen */
    max-width: 320px; /* Prevents the image from getting way too big */
    border: 4px solid #5fe3ec;
    margin-top: 25px;
}
</style>
</head>

<body>

<div class="nav">
    <a href="index.html">home</a>
    <a href="about.html">about me</a>
    <a href="achievement.html">achievement</a>
    <a href="projects.html" class="active">projects</a>
    <a href="socials.html">socials</a>
</div>

<table class="projects-table">
    <tr>
        
        <td class="project-column">
            <h2>Project 1</h2>
            <hr class="cyan-line">
            <hr class="cyan-line">
            <hr class="cyan-line">
            <hr class="cyan-line">
            <hr class="cyan-line">
            <hr class="cyan-line">
            <hr class="cyan-line">
            <img src="ProgExam.png" class="project-image" alt="Project 1 Preview">
        </td>
        
        <td class="project-column">
            <h2>Project 2</h2>
            <hr class="cyan-line">
            <hr class="cyan-line">
            <hr class="cyan-line">
            <hr class="cyan-line">
            <hr class="cyan-line">
            <hr class="cyan-line">
            <hr class="cyan-line">
            <img src="infomWeb.png" class="project-image" alt="Project 2 Preview">
        </td>
        
        <td class="project-column">
            <h2>Project 3</h2>
            <hr class="cyan-line">
            <hr class="cyan-line">
            <hr class="cyan-line">
            <hr class="cyan-line">
            <hr class="cyan-line">
            <hr class="cyan-line">
            <hr class="cyan-line">
            <img src="Figma1.png" class="project-image" alt="Project 3 Preview">
        </td>

    </tr>
</table>

</body>
</html>
